services:
  - type: web
    name: wigope-api
    runtime: node
    rootDir: backend
    plan: starter
    region: singapore
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: APP_NAME
        value: Wigope Pay
      - key: SKIP_INFRA_CONNECT
        value: false
      - key: LOG_LEVEL
        value: info
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: MONGO_URI
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: PII_ENCRYPTION_KEY
        sync: false
      - key: SMS_PROVIDER
        value: inboxraja
      - key: INBOXRAJA_API_KEY
        sync: false
      - key: INBOXRAJA_SENDER_ID
        value: WIGOPE
      - key: INBOXRAJA_TEMPLATE_ID
        sync: false
      - key: INBOXRAJA_BASE_URL
        value: https://web.inboxraja.in/dev
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: HUBBLE_X_SECRET
        sync: false
      - key: HUBBLE_WEBHOOK_SECRET
        sync: false
      - key: HUBBLE_SSO_TTL_SECONDS
        value: 900
      - key: KWIKAPI_BASE_URL
        value: https://uat.kwikapi.com
      - key: KWIKAPI_API_KEY
        sync: false
      - key: KWIKAPI_WEBHOOK_SECRET
        sync: false
      - key: KWIKAPI_ENVIRONMENT
        value: uat
      - key: RECHARGE_MIN_AMOUNT
        value: 10
      - key: RECHARGE_MAX_AMOUNT
        value: 10000
      - key: RECHARGE_DAILY_LIMIT
        value: 20000
