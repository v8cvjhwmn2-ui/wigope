name: wigope_pay
description: Wigope — Recharge & Bill Payments. Fast, secure, made for India.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # UI
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  flutter_svg: ^2.0.10+1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  confetti: ^0.7.0
  animated_flip_counter: ^0.3.4
  pinput: ^5.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Forms
  reactive_forms: ^17.0.1

  # Phase 3 additions
  smooth_page_indicator: ^1.2.0+3
  sms_autofill: ^2.4.0
  webview_flutter: ^4.10.0

  # Utils
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.4
  riverpod_generator: ^2.4.3
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/operators/
    - assets/services/
    - assets/brands/
    - assets/partners/
    - assets/lottie/
    - assets/illustrations/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/splash_logo.png
  android_12:
    color: "#FFFFFF"
    image: assets/icons/splash_logo.png

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
